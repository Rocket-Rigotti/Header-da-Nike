<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header da Nike</title>
    <link rel="stylesheet" href="./css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" 
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" 
    crossorigin="anonymous" referrerpolicy="no-referrer" />

</head> 

<body>
      
    <header>
        

        <div class="topo">
       
           
           <a href="#" class="Logos">
           
              <img src="./img/jordan.svg" alt="Logo do jordan">
            
              <img src="./img/snkrs.svg" alt="Logo da letra SNKRS">

           </a>
        
           

          <ul class="menu-top">

             <li class="item-menu">Acessibilidade</li>
             <hr>
             <li class="item-menu">Guia de produtos</li>
             <hr>
             <li class="item-menu">Acompanhe seu pedido</li>
             <hr>
             <li class="item-menu">Ajuda</li>
             <hr>
             <li class="item-menu">Junte-se a nós</li>
             <hr>
             <li class="item-menu">Entrar</li>
             
        
          </ul>
       
        </div>

        <div class="metade">

            <a href="#">

                <img src="./img/logo.svg" alt="Logo da Nike">

            </a>

            <ul class="menu-metade">
                
                <li class="item-metade">Seleção Brasileira</li>
                <li class="item-metade">Ofertas</li>
                <li class="item-metade">Lançamentos</li>
                <li class="item-metade">Masculino</li>
                <li class="item-metade">Feminino</li>
                <li class="item-metade">Infantil</li>
                <li class="item-metade">SNKRS</li>
            
            </ul>

            <ul class="icones-metade">
                
                <i class="fa-solid fa-magnifying-glass"></i>
                <i class="fa-regular fa-heart" style="color: rgb(0, 0, 0);"></i>
                <i class="fa-solid fa-bag-shopping"></i>

            </ul>

         </div>

          
        <div class="barra-final">

            <ul class="final">
                
                 <li class=" seta1 fa-solid fa-angle-left" style="color: rgb(0, 0, 0);"></i>
                 <li class=" icone-shoes fa-solid fa-shoe-prints" style="color: rgb(0, 0, 0);"></i>
                 <li class="itens-final1">TÊNIS DE CORRIDA</li>
                 <li class="itens-final2">Encontre seu tênis ideal.</li>
                 <li class="itens-final3">Saiba mais</li>
                 <li class=" seta2 fa-solid fa-angle-right" style="color: rgb(0, 0, 0);"></i>
           
            </ul>

         </div>

    </header> 






</body>

</html>
